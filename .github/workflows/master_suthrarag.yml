# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - suthrarag

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Stage files for deployment
        run: |
          # Create a clean release directory
          mkdir -p release
          # Copy everything except node_modules, .git, .next, etc.
          rsync -a --exclude 'node_modules' --exclude '.git' --exclude '.next' --exclude 'webapp_logs*' --exclude 'release' --exclude 'tmp_deploy' ./ release/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0757B51994AF4697B5DC2C20DA093815 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CE63DC3CAF0C48D7A460790723AE5E14 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FF4A777DD3514825868820F92ED11513 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'suthrarag'
          slot-name: 'Production'
          package: .